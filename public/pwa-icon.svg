<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#111111"/>

  <!-- 12 month rows — the annual planner grid -->
  <!-- Each row: label area + day strip -->

  <!-- Row lines -->
  <rect x="56" y="80"  width="400" height="28" rx="3" fill="#1a1a1a"/>
  <rect x="56" y="116" width="400" height="28" rx="3" fill="#1a1a1a"/>
  <rect x="56" y="152" width="400" height="28" rx="3" fill="#1a1a1a"/>
  <rect x="56" y="188" width="400" height="28" rx="3" fill="#1a1a1a"/>
  <rect x="56" y="224" width="400" height="28" rx="3" fill="#1a1a1a"/>
  <rect x="56" y="260" width="400" height="28" rx="3" fill="#1a1a1a"/>
  <rect x="56" y="296" width="400" height="28" rx="3" fill="#1a1a1a"/>
  <rect x="56" y="332" width="400" height="28" rx="3" fill="#1a1a1a"/>
  <rect x="56" y="368" width="400" height="28" rx="3" fill="#1a1a1a"/>
  <rect x="56" y="404" width="400" height="28" rx="3" fill="#1a1a1a"/>

  <!-- Event bands — a few coloured strips across some months -->
  <!-- Feb: travel (amber) -->
  <rect x="130" y="121" width="160" height="6" rx="2" fill="#f59e0b" opacity="0.9"/>
  <!-- Apr: travel (amber) -->
  <rect x="200" y="193" width="180" height="6" rx="2" fill="#f59e0b" opacity="0.9"/>
  <!-- Jun: work (indigo) -->
  <rect x="160" y="265" width="110" height="6" rx="2" fill="#6366f1" opacity="0.9"/>
  <!-- Aug: travel (amber) -->
  <rect x="100" y="301" width="200" height="6" rx="2" fill="#f59e0b" opacity="0.9"/>
  <!-- Dec: travel (amber) -->
  <rect x="220" y="409" width="190" height="6" rx="2" fill="#f59e0b" opacity="0.9"/>

  <!-- Today highlight — small indigo square on one day in current month -->
  <rect x="260" y="188" width="20" height="28" rx="3" fill="#6366f1" opacity="0.25"/>
</svg>
